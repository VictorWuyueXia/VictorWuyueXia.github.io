<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #0f172a;
        color: #f8fafc;
      }

      main {
        width: min(90vw, 38rem);
        text-align: center;
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(3rem, 10vw, 7rem);
        line-height: 1;
      }

      p {
        margin: 0.75rem 0;
        color: #cbd5e1;
        font-size: 1.125rem;
        line-height: 1.7;
      }

      a {
        color: #93c5fd;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>404</h1>
      <p>Sorry, this page does not exist.</p>
      <p>
        Please contact me at
        <a href="mailto:victor.w.x@icloud.com">victor.w.x@icloud.com</a>
        and I will fix this ASAP.
      </p>
    </main>
  </body>
</html>
